included:
  - Projects

excluded:
  - Projects/*/Derived
  - Projects/*/Sources/**/Tests

# MARK: - Rules

disabled_rules:
  - trailing_whitespace

opt_in_rules:
  - empty_count
  - explicit_init
  - closure_spacing
  - overridden_super_call
  - redundant_nil_coalescing
  - private_outlet
  - anyobject_protocol
  - array_init
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_range_nil_comparison
  - discouraged_object_literal
  - empty_string
  - fatal_error_message
  - first_where
  - joined_default_parameter
  - last_where
  - literal_expression_end_indentation
  - modifier_order
  - multiline_arguments
  - multiline_function_chains
  - multiline_parameters
  - operator_usage_whitespace
  - prefer_self_type_over_type_of_self
  - sorted_first_last
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call

# MARK: - Lengths

line_length:
  warning: 130
  error: 200
  ignores_comments: true
  ignores_urls: true

file_length:
  warning: 400
  error: 600

type_body_length:
  warning: 300
  error: 400

function_body_length:
  warning: 60
  error: 100

# MARK: - Naming

type_name:
  min_length: 3
  max_length:
    warning: 50
    error: 60

identifier_name:
  min_length:
    warning: 2
  max_length:
    warning: 50
    error: 60
  excluded:
    - id
    - vc
    - vm

# MARK: - Custom rules

custom_rules:
  no_print:
    name: "No print statements"
    regex: '(?<!\/\/\s)(\bprint\s*\()'
    message: "Use a proper logger instead of print()"
    severity: warning
